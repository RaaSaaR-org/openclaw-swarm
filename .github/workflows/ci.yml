name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  operator:
    name: Operator (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: operator

      - name: Test
        run: make test

      - name: Build
        run: go build -o /dev/null ./cmd/main.go

  chat:
    name: Chat UI (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/customer-chat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/customer-chat/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [operator, chat]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build operator image
        run: docker build -t swarm-operator:ci operator/

      - name: Build chat image
        run: docker build -t emai-customer-chat:ci web/customer-chat/
