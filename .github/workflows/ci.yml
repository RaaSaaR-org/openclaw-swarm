name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  operator:
    name: Operator (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Fmt
        run: test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test

      - name: Build
        run: go build -ldflags "-X main.Version=ci-${{ github.sha }}" -o /dev/null ./cmd/main.go

  web:
    name: Web (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [customer-chat, customer-center, admin-console, onboarding, status-page]
    defaults:
      run:
        working-directory: web/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/${{ matrix.app }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build SPA
        run: npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: web/${{ matrix.app }}/server/go.mod

      - name: Server vet
        working-directory: web/${{ matrix.app }}/server
        run: go vet ./...

      - name: Server build
        working-directory: web/${{ matrix.app }}/server
        run: |
          mkdir -p web && touch web/.gitkeep
          go build -o /dev/null .

  templates:
    name: Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate openclaw.json template
        run: |
          # Render template with test values and validate JSON
          sed 's/{{CUSTOMER_NAME}}/Test/g; s/{{CUSTOMER_SLUG}}/test/g; s/{{PROJECT_NAME}}/Test/g; s/${OPENCLAW_MODEL}/test-model/g' \
            operator/internal/controller/templates/openclaw.json.tmpl | python3 -c "
          import sys, json
          cfg = json.load(sys.stdin)
          assert cfg['tools']['profile'] == 'coding', f'tools.profile should be coding, got {cfg[\"tools\"][\"profile\"]}'
          assert cfg['agents']['defaults']['workspace'] == '/home/node/.openclaw/workspace', 'wrong workspace path'
          print('openclaw.json template OK')
          "

      - name: Check mc -y flag consistency
        run: |
          # All mc commands in agent/template files should use -y
          FILES=$(find operator/internal/controller/templates agents -name '*.md' -o -name '*.tmpl' | grep -v node_modules)
          ERRORS=0
          for f in $FILES; do
            while IFS= read -r line; do
              trimmed=$(echo "$line" | sed 's/^[[:space:]]*//')
              if echo "$trimmed" | grep -qE '^\./mc [^-]|^mc [^-]' && ! echo "$trimmed" | grep -qE '^\./mc -y|^mc -y|^#|binary'; then
                echo "FAIL: $f: missing -y flag: $trimmed"
                ERRORS=$((ERRORS + 1))
              fi
            done < "$f"
          done
          if [ $ERRORS -gt 0 ]; then
            echo "$ERRORS mc commands missing -y flag"
            exit 1
          fi
          echo "All mc commands use -y flag"

      - name: Check no stale references
        run: |
          # No customer-workspace, mc get_status, or messaging profile in templates
          FILES=$(find operator/internal/controller/templates agents -name '*.md' -o -name '*.tmpl' -o -name '*.json' | grep -v node_modules)
          ERRORS=0
          for pattern in "customer-workspace" "mc get_status" '"messaging"'; do
            if grep -rl "$pattern" $FILES 2>/dev/null; then
              echo "FAIL: found stale reference: $pattern"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "No stale references found"

  docker:
    name: Docker Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [operator, web, templates]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: operator
            context: operator
            dockerfile: operator/Dockerfile
          # customer-chat and customer-center build from the repo root because
          # their Dockerfiles COPY the shared pkg/ module (TASK-004).
          - app: customer-chat
            context: .
            dockerfile: web/customer-chat/Dockerfile
          - app: customer-center
            context: .
            dockerfile: web/customer-center/Dockerfile
          - app: admin-console
            context: web/admin-console
            dockerfile: web/admin-console/Dockerfile
          - app: onboarding
            context: web/onboarding
            dockerfile: web/onboarding/Dockerfile
          - app: status-page
            context: web/status-page
            dockerfile: web/status-page/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ matrix.app }}:ci -f ${{ matrix.dockerfile }} ${{ matrix.context }}
