name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  operator-image:
    name: Build Operator Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/$REPO_LC/operator" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: operator
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

  chat-image:
    name: Build Chat Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/$REPO_LC/customer-chat" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web/customer-chat
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

  install-manifest:
    name: Generate Install Manifest
    runs-on: ubuntu-latest
    needs: operator-image
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Extract metadata
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/$REPO_LC/operator" >> $GITHUB_OUTPUT

      - name: Generate install.yaml
        run: |
          cd operator
          IMG=${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} make build-installer

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: operator/dist/install.yaml
          generate_release_notes: true
