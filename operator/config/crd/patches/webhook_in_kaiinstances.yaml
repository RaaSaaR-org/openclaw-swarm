# Adds the conversion-webhook config to the KaiInstance CRD so the
# kube-apiserver routes v1alpha1 ↔ v1alpha2 conversions to the operator.
# CA bundle is injected by cert-manager via the cainjection patch.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kaiinstances.swarm.emai.io
spec:
  conversion:
    strategy: Webhook
    webhook:
      conversionReviewVersions: ["v1"]
      clientConfig:
        service:
          namespace: system
          name: webhook-service
          path: /convert
          port: 443
