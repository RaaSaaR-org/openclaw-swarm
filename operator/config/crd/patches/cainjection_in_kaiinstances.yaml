# cert-manager injects the CA bundle from the `operator-serving-cert`
# Certificate (in the `operator-system` namespace, after the kustomize
# namePrefix + namespace transforms) into the CRD's
# conversion.webhook.clientConfig.caBundle field. Without this annotation
# the kube-apiserver can't trust the webhook's self-signed cert.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kaiinstances.swarm.emai.io
  annotations:
    cert-manager.io/inject-ca-from: operator-system/operator-serving-cert
