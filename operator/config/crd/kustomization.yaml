# This kustomization.yaml is not intended to be run by itself,
# since it depends on service name and namespace that are out of this kustomize package.
# It should be run by config/default
resources:
- bases/swarm.emai.io_kaiinstances.yaml
# +kubebuilder:scaffold:crdkustomizeresource

patches:
# Conversion webhook for KaiInstance v1alpha1 ↔ v1alpha2 (TASK-012 Phase 2.B
# + TASK-024 Phase 5). The webhook patch points the CRD at the operator's
# Service; the cainjection patch tells cert-manager to fill in the CA bundle
# from the serving-cert Secret. Both must apply together for the
# kube-apiserver to trust the webhook.
- path: patches/webhook_in_kaiinstances.yaml
- path: patches/cainjection_in_kaiinstances.yaml
# +kubebuilder:scaffold:crdkustomizewebhookpatch

configurations:
- kustomizeconfig.yaml
