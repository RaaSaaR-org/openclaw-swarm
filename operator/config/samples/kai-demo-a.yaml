apiVersion: swarm.emai.io/v1alpha1
kind: KaiInstance
metadata:
  name: kai-demo-customer-a
  namespace: emai-swarm
spec:
  customerName: "Demo Customer A"
  projectName: "Pilot Project Alpha"
  customerSlug: "demo-customer-a"
  gatewayAuth:
    mode: "token"
    token: "demo-a-dev-token"
  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "500m"
