apiVersion: swarm.emai.io/v1alpha2
kind: KaiInstance
metadata:
  name: kai-demo-customer-a
  namespace: swarm-system
spec:
  tenantName: "Demo Customer A"
  projectName: "Pilot Project Alpha"
  tenantSlug: "demo-customer-a"
  gatewayAuth:
    mode: "token"
    token: "demo-a-dev-token"
  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "500m"
