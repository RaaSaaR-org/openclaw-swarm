apiVersion: swarm.emai.io/v1alpha2
kind: KaiInstance
metadata:
  name: kai-demo-customer-b
  namespace: swarm-system
spec:
  tenantName: "Demo Customer B"
  projectName: "Research Collaboration"
  tenantSlug: "demo-customer-b"
  gatewayAuth:
    mode: "token"
    token: "demo-b-dev-token"
  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "500m"
