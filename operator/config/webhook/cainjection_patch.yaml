# Adds the cert-manager CA-injection annotation to the ValidatingWebhookConfiguration
# generated by controller-gen. The CA is the same one provisioned for the CRD
# conversion webhook (`operator-system/operator-serving-cert`) — both
# webhooks live on the same operator pod and serve from the same TLS cert.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: operator-system/operator-serving-cert
