apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
          - name: INGRESS_DOMAIN
            value: "kai.emai.dev"
          - name: INGRESS_TLS_SECRET
            value: "kai-emai-dev-tls"
          # SWARM_POOLED_OPENROUTER_SECRET, when set, makes every reconciled
          # KaiInstance read its OPENROUTER_API_KEY from this single Secret in
          # the same namespace instead of the per-tenant kai-<slug>-openrouter
          # Secret. This is the SaaS-tier wiring (PROP-002 pooled-only). Leave
          # unset to keep the historical per-tenant BYOK-shaped fallback.
          # The Secret itself is provisioned by the deployment overlay
          # (swarm-cloud / swarm-emai), not the public swarm repo.
          # - name: SWARM_POOLED_OPENROUTER_SECRET
          #   value: "swarm-pooled-openrouter"
          #
          # SWARM_CATALOG_DIR is where the operator reads the SaaS app catalog
          # from at runtime (TASK-018 Phase 1). When a KaiInstance has
          # `spec.appRef` set, the operator looks for
          # `<dir>/<appRef>/SOUL.md.tmpl` and uses that persona's SOUL.md
          # instead of the embedded customer-template default. Default
          # `/etc/swarm/catalog`. The deployment overlay creates a ConfigMap
          # from `agents/catalog/` and mounts it at this path:
          #
          #   kubectl create configmap agents-catalog \
          #     --from-file=agents/catalog/personal-assistant/SOUL.md.tmpl \
          #     --from-file=agents/catalog/coding-helper/SOUL.md.tmpl \
          #     ... etc.
          #
          # Or use the projected-config pattern with a sub-directory per slug
          # (matches the on-disk layout in agents/catalog/). The operator
          # tolerates a missing dir/file — falls back to the embedded
          # customer-template — so this is safe to wire up incrementally.
          - name: SWARM_CATALOG_DIR
            value: "/etc/swarm/catalog"
          # SWARM_PER_SLUG_INGRESS=1 makes the operator render per-tenant
          # Ingresses with host `<slug>.<INGRESS_DOMAIN>` + path `/ws`
          # (the SaaS shape — wildcard cert from TASK-017 Phase 0 covers
          # it). Default (unset) keeps the legacy shared host
          # `<INGRESS_DOMAIN>` + path `/ws/<slug>` so existing tenants
          # don't get their URLs broken on a hot operator deploy.
          # Flip this only AFTER the deployment overlay has updated each
          # tenant's chat-bridge config to point at the new URL — see
          # TASK-017 Phase 2+ for the cutover playbook.
          # - name: SWARM_PER_SLUG_INGRESS
          #   value: "1"
        ports: []
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
