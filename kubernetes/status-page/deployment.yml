apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
  namespace: emai-swarm
  labels:
    app: status-page
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-page
  template:
    metadata:
      labels:
        app: status-page
        component: web
    spec:
      serviceAccountName: status-page
      containers:
        - name: status-page
          image: ghcr.io/raasaar-org/openclaw-swarm/status-page:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ADDR
              value: ":8080"
            - name: SWARM_NAMESPACE
              value: "emai-swarm"
            - name: BRANDING_DIR
              value: "/branding"
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: branding
              mountPath: /branding
              readOnly: true
      volumes:
        - name: branding
          configMap:
            name: status-page-branding
            optional: true
