apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: emai-swarm
  labels:
    app: chat
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
        component: web
    spec:
      serviceAccountName: chat
      containers:
        - name: chat
          image: ghcr.io/raasaar-org/openclaw-swarm/chat:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ADDR
              value: ":8080"
            - name: SWARM_NAMESPACE
              value: "emai-swarm"
            - name: BRANDING_DIR
              value: "/branding"
          resources:
            # argon2id (64 MiB working set per concurrent login) needs headroom.
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: branding
              mountPath: /branding
              readOnly: true
      volumes:
        - name: branding
          configMap:
            name: chat-branding
            optional: true
