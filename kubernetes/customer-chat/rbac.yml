# customer-chat reads:
#   - kaiinstances (to look up the per-customer gateway URL + token)
#   - kai-<slug>-users Secrets (to verify email + password)
#   - kai-<slug>-chat-bridge Secrets (device keypair + JWT signing secret)
# It never writes — admin writes happen via customer-center.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: customer-chat
  namespace: emai-swarm
rules:
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: customer-chat
  namespace: emai-swarm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: customer-chat
subjects:
  - kind: ServiceAccount
    name: customer-chat
    namespace: emai-swarm
