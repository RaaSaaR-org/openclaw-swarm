# Role: Kira can manage KaiInstance CRs (create/list/delete customer agents)
# but has NO access to Deployments, Secrets, or other workload resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kira-kaiinstance-manager
  namespace: emai-swarm
rules:
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances/status"]
    verbs: ["get"]
  # Allow Kira to exec into Kai pods (for device pairing approval, diagnostics)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Needed for `kubectl exec deployment/kai-<slug>` (resolves deployment → pod)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kira-kaiinstance-manager-binding
  namespace: emai-swarm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kira-kaiinstance-manager
subjects:
  - kind: ServiceAccount
    name: kira-central
    namespace: emai-swarm
