# external-dns Deployment with the Hetzner provider. Single replica; the
# controller is stateless and naturally idempotent (DNS reconciliation), so
# leader election + multiple replicas don't buy much for v1.
#
# Override --domain-filter and --txt-owner-id in the deployment overlay so
# multiple clusters (e.g. swarm-cloud + swarm-emai) don't fight over the
# same records under one Hetzner DNS zone.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.18.0
          args:
            - --source=ingress
            - --source=service
            - --provider=hetzner
            - --domain-filter=kai.example.org   # OVERRIDE
            - --txt-owner-id=kai-cloud           # OVERRIDE per cluster
            - --policy=upsert-only               # never delete records on its own
            - --interval=2m
            - --log-format=json
            - --log-level=info
          env:
            - name: HETZNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hetzner-dns-token
                  key: api-token
          resources:
            requests:
              memory: 64Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 100m
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
