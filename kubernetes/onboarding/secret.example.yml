# Example. Generate a token and apply manually:
#   kubectl create secret generic onboarding-auth \
#     --from-literal=token="$(openssl rand -hex 32)" \
#     -n swarm-system
apiVersion: v1
kind: Secret
metadata:
  name: onboarding-auth
type: Opaque
stringData:
  token: "replace-me-with-a-strong-random-token"
