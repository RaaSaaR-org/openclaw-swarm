# Onboarding service + its sibling CronJobs (gdpr-purge, idle-suspend)
# share this ServiceAccount.
#  - server: get/list/create KaiInstance (signup-time provisioning).
#  - idle-suspend (TASK-015 Phase 3): adds patch so the cron can flip
#    `spec.suspended=true` on free-tier-idle workspaces. The patch verb
#    is scoped to KaiInstance; it does NOT grant patch on other resources.
#  - delete still goes through admin-console / swarm-ctl — patch alone
#    can't drop a workspace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: onboarding
rules:
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances"]
    verbs: ["get", "list", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: onboarding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: onboarding
subjects:
  - kind: ServiceAccount
    name: onboarding
    namespace: swarm-system
