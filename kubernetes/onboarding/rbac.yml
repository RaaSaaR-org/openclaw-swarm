# Onboarding service can create new KaiInstance CRs.
# It cannot delete or patch existing ones — those go through admin-console / swarm-ctl.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: onboarding
  namespace: emai-swarm
rules:
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: onboarding
  namespace: emai-swarm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: onboarding
subjects:
  - kind: ServiceAccount
    name: onboarding
    namespace: emai-swarm
