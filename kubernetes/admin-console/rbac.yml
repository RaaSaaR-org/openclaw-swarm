# Admin console can read and patch KaiInstance CRs (suspend/resume).
# It cannot create or delete instances — that stays with the central agent (kira-central)
# or a human via swarm-ctl.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-console
rules:
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: admin-console
subjects:
  - kind: ServiceAccount
    name: admin-console
    namespace: swarm-system
