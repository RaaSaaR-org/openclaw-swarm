# Example. Do not commit a real token — generate one and apply manually:
#   kubectl create secret generic admin-console-auth \
#     --from-literal=token="$(openssl rand -hex 32)" \
#     -n swarm-system
apiVersion: v1
kind: Secret
metadata:
  name: admin-console-auth
type: Opaque
stringData:
  token: "replace-me-with-a-strong-random-token"
