apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-console
  namespace: emai-swarm
  labels:
    app: admin-console
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-console
  template:
    metadata:
      labels:
        app: admin-console
        component: web
    spec:
      serviceAccountName: admin-console
      containers:
        - name: admin-console
          image: emai-admin-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ADDR
              value: ":8080"
            - name: SWARM_NAMESPACE
              value: "emai-swarm"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: admin-console-auth
                  key: token
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
