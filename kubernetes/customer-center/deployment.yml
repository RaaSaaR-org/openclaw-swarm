apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-center
  namespace: emai-swarm
  labels:
    app: customer-center
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-center
  template:
    metadata:
      labels:
        app: customer-center
        component: web
    spec:
      serviceAccountName: customer-center
      containers:
        - name: customer-center
          image: ghcr.io/raasaar-org/openclaw-swarm/customer-center:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ADDR
              value: ":8080"
            - name: SWARM_NAMESPACE
              value: "emai-swarm"
            # Optional: override hosts for /chat and /status links.
            # When empty, links are relative paths (good for shared host).
            - name: CHAT_BASE_URL
              value: ""
            - name: STATUS_BASE_URL
              value: ""
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
