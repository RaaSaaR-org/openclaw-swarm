# customer-center reads KaiInstances (to validate the gateway token + read
# customer-link annotations), per-customer briefing/profile ConfigMaps, and
# manages the per-customer kai-<slug>-users Secret (Team-access panel).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: customer-center
  namespace: emai-swarm
rules:
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: customer-center
  namespace: emai-swarm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: customer-center
subjects:
  - kind: ServiceAccount
    name: customer-center
    namespace: emai-swarm
