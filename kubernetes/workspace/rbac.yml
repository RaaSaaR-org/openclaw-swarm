# workspace reads KaiInstances (to validate the gateway token + read
# customer-link annotations), per-customer briefing/profile ConfigMaps, and
# manages the per-customer kai-<slug>-users Secret (Team-access panel).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workspace
rules:
  - apiGroups: ["swarm.emai.io"]
    resources: ["kaiinstances"]
    # `list` is needed for the SaaS owned-workspaces dashboard
    # (TASK-014 P3) which lists every KaiInstance labelled with the
    # signed-in user's ID. The TASK-021 P3 deletion cascade also lists
    # by label before patching delete on each.
    # `delete` lets the deletion cascade actually remove the user's
    # KaiInstances during account deletion.
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workspace
subjects:
  - kind: ServiceAccount
    name: workspace
    namespace: swarm-system
