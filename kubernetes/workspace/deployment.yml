apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace
  labels:
    app: workspace
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace
  template:
    metadata:
      labels:
        app: workspace
        component: web
    spec:
      serviceAccountName: workspace
      containers:
        - name: workspace
          image: ghcr.io/raasaar-org/openclaw-swarm/workspace:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ADDR
              value: ":8080"
            - name: SWARM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Optional: override hosts for /chat and /status links.
            # When empty, links are relative paths (good for shared host).
            - name: CHAT_BASE_URL
              value: ""
            - name: STATUS_BASE_URL
              value: ""
            - name: BRANDING_DIR
              value: "/branding"
          resources:
            # argon2id uses ~64 MiB working set during hashing; leave headroom.
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: branding
              mountPath: /branding
              readOnly: true
      volumes:
        - name: branding
          configMap:
            name: workspace-branding
            optional: true
